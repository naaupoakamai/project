# Repo root = bespeak/. Render → New → Blueprint → выбери этот файл.
# После деплоя: задай OPENAI_API_KEY на сервисе bespeak-api (опционально).

databases:
  - name: bespeak-db
    plan: free
    databaseName: bespeak
    user: bespeak

services:
  - type: web
    name: bespeak-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4
    healthCheckPath: /api/products/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://bespeak-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: bespeak-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: bespeak-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: frontend/dist/bespeak
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
